<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.7, maximum-scale=0.7">
  <title>secretlabel</title>
  <link rel="icon" href="sl-icon-white.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" class="splash">
    <svg id="splash-logo" class="splash-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="ripple-s">
          <feTurbulence id="turb-s" type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="1" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="ripple-l">
          <feTurbulence id="turb-l" type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="7" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
      <g id="logo-nodes" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path data-noise data-letter="s" filter="url(#ripple-s)" d="M 110 55 C 110 40 100 30 85 30 C 65 30 60 45 60 55 C 60 70 70 80 85 80 C 100 80 110 90 110 105 C 110 125 95 135 75 135 C 55 135 45 120 45 110"/>
        <path data-noise data-letter="l" filter="url(#ripple-l)" d="M 125 30 L 125 140 L 165 140"/>
      </g>
    </svg>
    <p class="hint">click to enter</p>
  </div>

  <!-- SITE -->
  <div id="site" class="site">

    <div class="header">
      <a href="https://secretlabel.net" >
        <img src="sl-icon-white.png" alt="secretlabel" class="header-icon">
      </a>
      <a href="/" >
        <h1 class="logo">secretlabel</h1>
      </a>

    </div>

    <section class="releases-section closed">

      <div class="releases">

        <div class="card" data-bandcamp="https://11ai.bandcamp.com/" data-img="sl001-lighter.jpg" data-alt="color coordinates cover art" data-catalog="SL001" data-title="Leapyear Register" data-artist="11ai" data-date="Releasing June 30, 2026" data-brief="Leapyear Register, 11ai's first self-released album in four years, pays homage to the adventurous spirit of 1990s and early-2000s electronica through eleven tracks inspired by house, IDM, ambient, drum & bass, and electro-pop. Each piece draws from different electronic traditions while remaining unified by 11ai's melodic songwriting, rich harmonic language, and distinctive production style.
        <br><br>
       First physical discs will be available at the <a href='https://instagram.com/11ai.link'>CD release party</a> at Sun Space in Los Angeles on August 15th.<br><br>Album out on all digital platforms on July 30th.">
          <img src="sl001-lighter.jpg" alt="color coordinates cover art">
          <div class="card-text">
            <span class="card-catalog">SL001</span>
            <span class="card-title">Leapyear Register</span>
            <span class="card-artist">11ai</span>
            <span class="card-date">Releasing June 30, 2026</span>
          </div>
        </div>

        <div class="card" data-bandcamp="https://drinksmenu.bandcamp.com/album/secret-disc" data-embed="2752634160" data-img="sl000.jpg" data-alt="•SECRET DISC• cover art" data-catalog="SL000" data-title="•SECRET DISC•" data-artist="DRINKS MENU" data-date="Released August 4, 2025" data-brief="The disc(s) are real. Given out at shows to supporters only. ">
          <img src="sl000.jpg" alt="•SECRET DISC• cover art">
          <div class="card-text">
            <span class="card-catalog">SL000</span>
            <span class="card-title">•SECRET DISC•</span>
            <span class="card-artist">DRINKS MENU</span>
            <span class="card-date">Released August 4, 2025</span>
          </div>
        </div>

      </div>

    </section>

    <footer class="info">
      <p>Boutique Los Angeles CD label.
      <p>Discogs: <a href="https://www.discogs.com/label/4373509-Secret-Label" target="_blank">Secret Label</a></p>
    </footer>

  </div>

  <!-- Release detail modal -->
  <div id="modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <button class="modal-close">&times;</button>
      <div class="modal-body">
        <img class="modal-img" src="" alt="">
        <div class="modal-info">
          <span class="modal-catalog"></span>
          <h2 class="modal-title"></h2>
          <span class="modal-artist"></span>
          <span class="modal-date"></span>
        </div>
        <div class="modal-brief"></div>
        <a class="modal-link" href="" target="_blank">Listen on Bandcamp &rarr;</a>
        <div class="modal-bandcamp"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
